<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoJournal — Memory Globe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

  <body>
    <div id="root">
      <div style="position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #030308; color: white; font-family: sans-serif;">

          <circle cx="12" cy="12" r="10"></circle>
          <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
        </svg>
        <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
        <h2 style="font-size: 1.25rem; font-weight: bold; margin: 0;">Initializing GeoJournal...</h2>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
